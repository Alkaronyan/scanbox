services:

  # ─────────────────────────────────────────────────────────────────────────
  # DHCP server for the USB NCM link.
  # Runs on the host network namespace so it can see usb0 directly.
  # Assigns IPs in 192.168.55.100-200 to the Windows PC on connect.
  # ─────────────────────────────────────────────────────────────────────────
  scanbox_dhcp:
    build: ./scanbox_dhcp
    container_name: scanbox_dhcp
    restart: always
    network_mode: host
    cap_add:
      - NET_ADMIN

  # ─────────────────────────────────────────────────────────────────────────
  # Mock camera scaffold.
  # Compiles v4l2loopback against the host kernel and creates /dev/video200
  # with a live SMPTE synthetic stream. Must be healthy before vid_mux starts.
  #
  # KBUILD_DIR is read from .env (generated by scripts/setup_host.sh).
  # Run: sudo ./scripts/setup_host.sh  — after any kernel update.
  # ─────────────────────────────────────────────────────────────────────────
  vid_mux_test:
    build: ./Vid_Mux_TEST
    image: scanbox_vid_mux_test
    container_name: vid_mux_test
    restart: always
    privileged: true
    network_mode: host
    volumes:
      - /lib/modules:/lib/modules:ro
      - /usr/src:/usr/src:ro
      - ${KBUILD_DIR}:${KBUILD_DIR}:ro
    healthcheck:
      test: ["CMD", "sh", "-c", "ps aux | grep -q '[m]ock_streamer'"]
      interval: 5s
      timeout: 2s
      retries: 30
      start_period: 90s

  # ─────────────────────────────────────────────────────────────────────────
  # Production video switcher.
  # Flask REST API + MJPEG stream on port 80 (host network).
  # Waits for vid_mux_test to be healthy (video200 exists) before starting.
  #
  # MULTI-CAMERA NOTE:
  #   For dynamic multi-camera support (1-4 physical cameras), use:
  #     ./scripts/rebuild_vid_mux.sh
  #   That script auto-detects all /dev/v4l/by-id/*-video-index0 devices,
  #   assigns slots video100-video103, builds SCANBOX_SOURCES JSON, and
  #   passes it as an env var to the container with the correct --device flags.
  #
  #   This compose file is intentionally simplified for boot automation:
  #   it starts vid_mux with one hardcoded physical camera (video100) so
  #   that `docker compose up -d` works at boot without knowing which cameras
  #   are connected. The SCANBOX_SOURCES default below covers the single-camera
  #   + mock-camera case that is the common production configuration.
  # ─────────────────────────────────────────────────────────────────────────
  vid_mux:
    build: ./Vid_Mux
    container_name: vid_mux
    restart: on-failure
    network_mode: host
    devices:
      # Physical camera — deterministic by-id path (never changes).
      # NOTE: For multi-camera setups use scripts/rebuild_vid_mux.sh instead.
      - /dev/v4l/by-id/usb-046d_0809_5DD0F8C2-video-index0:/dev/video100
      # Mock camera — created by vid_mux_test above
      - /dev/video200:/dev/video200
    environment:
      # Default single-camera + mock source definition.
      # rebuild_vid_mux.sh overrides this at runtime for multi-camera setups.
      SCANBOX_SOURCES: '[{"id":0,"slot":"/dev/video100","label":"usb-046d_0809_5DD0F8C2"},{"id":1,"slot":"/dev/video200","label":"mock"}]'
    volumes:
      - ./snapshots:/exports/snapshots
    depends_on:
      scanbox_dhcp:
        condition: service_started
      vid_mux_test:
        condition: service_healthy

  # ─────────────────────────────────────────────────────────────────────────
  # Test runner — pytest suite (all 5 layers) executed inside a container.
  # Uses the same image as vid_mux_test (already has GStreamer, Python, ffmpeg,
  # pytest, requests, and the docker CLI) but overrides the entrypoint to run
  # pytest instead of the mock streamer.
  #
  # Why this works for every layer:
  #   Layer 1 (hardware): Linux containers share the host kernel — lsmod reads
  #     /proc/modules from the real kernel. privileged:true removes the device
  #     cgroup whitelist so /dev/video* are visible. /dev/v4l is bind-mounted to
  #     expose the udev-managed by-id symlinks that don't appear automatically.
  #   Layer 2 (containers): /var/run/docker.sock gives the docker CLI full access
  #     to the host Docker daemon, same as running on the host.
  #   Layers 3-5 (pipeline, API, behavior): network_mode:host reaches the Flask
  #     API on localhost:80. The project directory is bind-mounted at the same
  #     host path so snapshot file paths in conftest.py resolve without changes.
  #
  # Usage (stack must already be up):
  #   docker compose --profile test run --rm test_runner
  #
  # profile:test keeps this service out of `docker compose up -d`.
  # ─────────────────────────────────────────────────────────────────────────
  test_runner:
    image: scanbox_vid_mux_test
    container_name: test_runner
    restart: "no"
    privileged: true
    network_mode: host
    profiles:
      - test
    entrypoint: ["python3", "-m", "pytest", "tests/", "-v", "--tb=short"]
    working_dir: /home/Alfred/scanbox/Vid_Mux_TEST
    volumes:
      # Full project at the same path as the host so all fixture paths resolve.
      - /home/Alfred/scanbox:/home/Alfred/scanbox
      # Docker socket — lets Layer 2 tests call `docker exec / inspect / ps`.
      - /var/run/docker.sock:/var/run/docker.sock
      # udev-managed by-id symlinks — not exposed by --privileged alone; needed
      # for Layer 1 physical camera enumeration tests.
      - /dev/v4l:/dev/v4l:ro
    environment:
      - SCANBOX_API_URL=http://localhost:80
    depends_on:
      vid_mux_test:
        condition: service_healthy
      vid_mux:
        condition: service_started
