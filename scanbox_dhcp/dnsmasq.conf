# Scanbox DHCP server — USB NCM link (usb0)
#
# Pi fixed IP : 192.168.199.1/30  (set by setup_usb_gadget.sh on the host)
# Windows gets: 192.168.199.2 via DHCP
#
# This is an isolated point-to-point link (/30 — only 2 usable hosts).
# We deliberately suppress default gateway (option 3) and DNS (option 6)
# so Windows keeps using its own internet connection for everything else.

interface=usb0
bind-interfaces

dhcp-range=192.168.199.2,192.168.199.2,255.255.255.252,12h

# No gateway — Windows must not route internet traffic through the Pi
dhcp-option=3

# No DNS — Windows keeps its own DNS
dhcp-option=6
